# ============================================================
# nginx.conf — Proxy Reverso para o Assistente Médico
# Opcional: usar quando a aplicação precisa de HTTPS ou
# balanceamento de carga em produção
# ============================================================

events {
    worker_connections 1024;
}

http {
    # Configurações gerais
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Logs de acesso e erro
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Timeout generoso para respostas do LLM (pode demorar)
    proxy_connect_timeout  300s;
    proxy_read_timeout     300s;
    proxy_send_timeout     300s;

    # Limite de tamanho do corpo da requisição
    client_max_body_size 50M;

    # Servidor principal
    server {
        listen 80;
        server_name localhost;

        # Redireciona HTTP para HTTPS (descomente em produção com SSL)
        # return 301 https://$host$request_uri;

        location / {
            # Proxy para o container da aplicação Gradio
            proxy_pass http://app:7860;

            # Headers necessários para WebSocket do Gradio
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers de proxy padrão
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache desabilitado para respostas dinâmicas
            proxy_cache_bypass $http_upgrade;
        }

        # Endpoint de health check
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # Configuração HTTPS (descomente e configure certificados para produção)
    # server {
    #     listen 443 ssl;
    #     server_name seu-dominio.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #
    #     location / {
    #         proxy_pass http://app:7860;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host $host;
    #     }
    # }
}
